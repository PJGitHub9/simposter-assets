name: Sync Missing Logos

on:
  schedule:
    - cron: "0 9 * * 1"  # Every Monday at 9am UTC
  workflow_dispatch:      # Allow manual trigger from Actions tab

permissions:
  contents: write  # Needed to commit, push, and create releases

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history so we can read tags

      - name: Sparse-clone lynxstrike/lynxstrike.repo (decompiled/ only)
        run: |
          git clone --filter=blob:none --sparse https://github.com/lynxstrike/lynxstrike.repo.git lynxstrike-source
          cd lynxstrike-source
          git sparse-checkout set decompiled

      - name: Copy missing/updated files and prepare release notes
        id: sync
        run: |
          python3 - <<'EOF'
          import hashlib, os, shutil

          logos_dir  = "logos"
          source_dir = "lynxstrike-source/decompiled"

          def md5(path):
              h = hashlib.md5()
              with open(path, "rb") as f:
                  for chunk in iter(lambda: f.read(65536), b""):
                      h.update(chunk)
              return h.hexdigest()

          from collections import Counter

          logos_files  = {f.lower(): f for f in os.listdir(logos_dir)  if os.path.isfile(os.path.join(logos_dir,  f))}
          source_files = {f.lower(): f for f in os.listdir(source_dir) if os.path.isfile(os.path.join(source_dir, f))}

          # Detect placeholder hash — most common hash across all source files
          hash_counts = Counter(md5(os.path.join(source_dir, f)) for f in source_files.values())
          placeholder_hash, ph_count = hash_counts.most_common(1)[0]
          print(f"Placeholder hash: {placeholder_hash} ({ph_count} files)")

          added, updated, placeholders = [], [], []

          for key, original in sorted(source_files.items()):
              src  = os.path.join(source_dir, original)
              dest = os.path.join(logos_dir, original)
              src_hash = md5(src)
              is_placeholder = src_hash == placeholder_hash
              if key not in logos_files:
                  shutil.copy(src, dest)
                  if is_placeholder:
                      placeholders.append(original)
                  else:
                      added.append(original)
              elif src_hash != md5(dest):
                  shutil.copy(src, dest)
                  if is_placeholder:
                      placeholders.append(original)
                  else:
                      updated.append(original)

          with open("added_files.txt",       "w") as f: f.write("\n".join(added))
          with open("updated_files.txt",     "w") as f: f.write("\n".join(updated))
          with open("placeholder_files.txt", "w") as f: f.write("\n".join(placeholders))

          summary = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")
          with open(summary, "a") as out:
              out.write("## Sync Results\n\n")
              out.write(f"| | Count |\n|---|---|\n")
              out.write(f"| logos/ (before) | {len(logos_files)} |\n")
              out.write(f"| lynxstrike decompiled/ | {len(source_files)} |\n")
              out.write(f"| **Added** | **{len(added)}** |\n")
              out.write(f"| **Updated** | **{len(updated)}** |\n")
              out.write(f"| **Placeholders** | **{len(placeholders)}** |\n\n")
              if added:
                  out.write("### Added\n\n")
                  for name in added: out.write(f"- `{name}`\n")
              if updated:
                  out.write("### Updated\n\n")
                  for name in updated: out.write(f"- `{name}`\n")
              if placeholders:
                  out.write("### Placeholders (no real logo yet)\n\n")
                  for name in placeholders: out.write(f"- `{name}`\n")
              if not added and not updated and not placeholders:
                  out.write(":white_check_mark: Already up to date — nothing to add or update.\n")
          EOF

      - name: Update asset index
        run: python3 generate_asset_index.py --updated updated_files.txt --placeholders placeholder_files.txt

      - name: Enrich new logos with TMDB IDs
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          # Combine added + placeholder into one list for TMDB lookup
          cat added_files.txt placeholder_files.txt | grep -v '^$' > new_files_for_tmdb.txt || true
          COUNT=$(wc -l < new_files_for_tmdb.txt | tr -d ' ')
          if [ "$COUNT" -gt "0" ]; then
            python3 enrich_tmdb_ids.py --files new_files_for_tmdb.txt
          else
            echo "No new logos — skipping TMDB enrichment."
          fi

      - name: Commit and push if anything changed
        id: commit
        run: |
          ADDED=$(wc -l < added_files.txt | tr -d ' ')
          UPDATED=$(wc -l < updated_files.txt | tr -d ' ')
          CHANGED=$((ADDED + UPDATED))
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.json logos/
          if [ "$CHANGED" -eq "0" ]; then
            # Only commit if any index changed
            if git diff --cached --quiet; then
              echo "nothing_added=true" >> $GITHUB_OUTPUT
              echo "No changes — skipping commit and release."
              exit 0
            fi
            echo "nothing_added=true" >> $GITHUB_OUTPUT
            git commit -m "Update asset index"
            git push
            exit 0
          fi
          echo "nothing_added=false" >> $GITHUB_OUTPUT
          MSG="Sync logos from lynxstrike"
          [ "$ADDED"   -gt "0" ] && MSG="$MSG: +$ADDED added"
          [ "$UPDATED" -gt "0" ] && MSG="$MSG, $UPDATED updated"
          git commit -m "$MSG"
          git push

      - name: Calculate next version
        id: version
        if: steps.commit.outputs.nothing_added == 'false'
        run: |
          # Get latest tag (default to v1.000 if none exist)
          LATEST=$(git tag --sort=-v:refname | head -n 1)
          if [ -z "$LATEST" ]; then
            NEXT="v1.000"
          else
            # Strip the 'v', increment by 0.001, reformat to 3 decimal places
            NUM="${LATEST#v}"
            NEXT="v$(python3 -c "print(f'{float(\"$NUM\") + 0.001:.3f}')")"
          fi
          echo "tag=$NEXT" >> $GITHUB_OUTPUT
          echo "Next version: $NEXT"

      - name: Create release
        if: steps.commit.outputs.nothing_added == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ADDED_COUNT=$(wc -l < added_files.txt | tr -d ' ')
          UPDATED_COUNT=$(wc -l < updated_files.txt | tr -d ' ')

          echo "## What's Changed" > release_notes.md

          if [ "$ADDED_COUNT" -gt "0" ]; then
            echo "" >> release_notes.md
            echo "### Added ($ADDED_COUNT)" >> release_notes.md
            echo "" >> release_notes.md
            while IFS= read -r line; do echo "- \`$line\`"; done < added_files.txt >> release_notes.md
          fi

          if [ "$UPDATED_COUNT" -gt "0" ]; then
            echo "" >> release_notes.md
            echo "### Updated ($UPDATED_COUNT)" >> release_notes.md
            echo "" >> release_notes.md
            while IFS= read -r line; do echo "- \`$line\`"; done < updated_files.txt >> release_notes.md
          fi

          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "Sourced from [lynxstrike/lynxstrike.repo](https://github.com/lynxstrike/lynxstrike.repo)" >> release_notes.md

          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release_notes.md
